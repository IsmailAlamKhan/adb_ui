name: adb_ui
description: Run adb commands with ease from a simple UI
publish_to: none
version: 0.0.15

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_hooks: ^0.18.5+1
  hooks_riverpod: ^2.0.2
  dynamic_color: ^1.5.4
  intl: ^0.17.0
  animations: ^2.0.7
  logging: ^1.1.0
  validators: ^3.0.0
  google_fonts: ^5.1.0
  freezed_annotation: ^2.2.0
  lottie: ^1.4.3
  network_info_plus: ^6.0.0
  file_picker: ^5.3.1
  desktop_drop: ^0.7.0
  cross_file: ^0.3.3+2
  async: ^2.9.0
  riverpod_annotation: ^1.0.4
  sliver_tools: ^0.2.8
  window_manager: ^0.5.1
  uuid: ^3.0.6
  device_info_plus: ^10.1.2
  archive: ^3.6.1
  path_provider: ^2.1.5
  path: ^1.8.2
  shared_preferences: ^2.5.4
  json_annotation: ^4.7.0
  url_launcher: ^6.3.2
  collection: ^1.16.0
  crypto: ^3.0.3
  package_info_plus: ^8.0.2
  github: ^9.5.0
  font_awesome_flutter: ^10.2.1
  supabase_flutter: ^2.12.2

dependency_overrides:
  win32: ^5.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.3.2
  freezed: ^2.2.0
  json_serializable: ^6.5.4
  riverpod_generator: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/
